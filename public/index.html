<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>七夕願い事投稿</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body class="entry-page">
    <main class="entry-shell">
      <section class="wish-form-panel" aria-labelledby="page-title">
        <div class="entry-panel-head">
          <p class="eyebrow">Tanabata Fes 2026</p>
          <a class="entry-projection-link" href="/projection">投影画面へ</a>
        </div>
        <h1 id="page-title">短冊に願いを</h1>
        <form id="wish-form" class="wish-form">
          <div class="wish-lines">
            <div class="wish-line-field">
              <label for="wish-line-1">1行目</label>
              <input id="wish-line-1" name="line1" type="text" maxlength="13" inputmode="text" autocomplete="off" required placeholder="例：研究がうまく">
              <span id="counter-1" class="line-counter">0 / 13</span>
            </div>
            <div class="wish-line-field">
              <label for="wish-line-2">2行目</label>
              <input id="wish-line-2" name="line2" type="text" maxlength="13" inputmode="text" autocomplete="off" placeholder="進みますように">
              <span id="counter-2" class="line-counter">0 / 13</span>
            </div>
          </div>
          <div class="form-row">
            <button type="submit">投稿する</button>
          </div>
        </form>
        <section class="preview-panel" aria-labelledby="preview-title">
          <div class="preview-head">
            <h2 id="preview-title">プレビュー</h2>
            <span class="preview-note">短冊表示の見え方</span>
          </div>
          <article class="preview-tanzaku" aria-label="投稿プレビュー">
            <span class="preview-string" aria-hidden="true"></span>
            <p id="preview-text" class="tanzaku-text" data-lines="1"></p>
          </article>
        </section>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>

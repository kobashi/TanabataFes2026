<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>七夕願い事 投影</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/projection.js" defer></script>
  </head>
  <body class="projection-page">
    <main class="projection-stage" aria-label="七夕祭り投影画面">
      <div class="star-field" aria-hidden="true"></div>
      <div class="meteor-field" aria-hidden="true">
        <span class="meteor meteor-1"></span>
        <span class="meteor meteor-2"></span>
        <span class="meteor meteor-3"></span>
      </div>
      <div class="cloud-layer" aria-hidden="true">
        <span class="cloud cloud-1"></span>
        <span class="cloud cloud-2"></span>
        <span class="cloud cloud-3"></span>
      </div>
      <button id="layout-menu-trigger" class="moon" type="button" aria-label="短冊レイアウトメニュー"></button>
      <div id="layout-menu" class="projection-layout-menu" hidden>
        <p class="projection-layout-menu-title">短冊レイアウト</p>
        <p id="layout-menu-state" class="projection-layout-menu-state">保存なし</p>
        <div class="projection-layout-menu-actions">
          <button id="layout-save-button" type="button">現在配置を保存</button>
          <button id="layout-load-button" type="button">保存配置を呼び出し</button>
        </div>
      </div>
      <div class="bamboo bamboo-left" aria-hidden="true"></div>
      <div class="bamboo bamboo-right" aria-hidden="true"></div>
      <section id="tanzaku-stage" class="tanzaku-stage"></section>
      <p id="empty-state" class="empty-state">願い事の承認を待っています</p>
    </main>
  </body>
</html>

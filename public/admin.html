<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>七夕願い事 管理</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/admin.js" defer></script>
  </head>
  <body class="admin-page">
    <header class="admin-header">
      <div>
        <h1>願い事管理</h1>
        <p id="live-state" class="admin-live-state" aria-live="polite">未接続</p>
      </div>
    </header>
    <nav class="admin-tabs" aria-label="管理画面タブ">
      <button type="button" class="admin-tab is-active" data-admin-tab="connection">接続</button>
      <button type="button" class="admin-tab" data-admin-tab="wishes">願い事管理</button>
      <button type="button" class="admin-tab" data-admin-tab="projection">投影設定</button>
      <button type="button" class="admin-tab" data-admin-tab="backup">バックアップ</button>
    </nav>
    <main>
      <section class="admin-tab-panel is-active" data-admin-panel="connection" aria-labelledby="connection-title">
        <section class="admin-controls" aria-labelledby="connection-title">
          <div>
            <h2 id="connection-title">接続</h2>
            <p class="admin-live-state">管理キーを入力して接続します</p>
          </div>
          <form id="key-form" class="key-form">
            <label for="admin-key">管理キー</label>
            <input id="admin-key" name="admin-key" type="password" autocomplete="current-password" placeholder="管理キー">
            <button type="submit">接続</button>
          </form>
        </section>
      </section>

      <section class="admin-tab-panel" data-admin-panel="wishes" aria-labelledby="moderation-mode-title">
        <section class="admin-controls" aria-labelledby="moderation-mode-title">
          <div>
            <h2 id="moderation-mode-title">承認モード</h2>
            <p id="moderation-state" class="admin-live-state" aria-live="polite">設定未取得</p>
          </div>
          <div class="admin-controls-actions">
            <label class="detail-toggle" for="wish-details-toggle">
              <input id="wish-details-toggle" type="checkbox" role="switch" aria-label="投稿詳細を表示">
              <span>投稿詳細</span>
            </label>
            <form id="moderation-form" class="moderation-form">
              <label class="mode-option">
                <input type="radio" name="moderation-mode" value="manual">
                <span>手動確認</span>
              </label>
              <label class="mode-option">
                <input type="radio" name="moderation-mode" value="auto">
                <span>自動承認</span>
              </label>
              <label class="mode-option">
                <input type="radio" name="moderation-mode" value="ai">
                <span>AI自動モデレート</span>
              </label>
              <button type="submit">適用</button>
            </form>
          </div>
        </section>
        <section class="field-panel" aria-labelledby="field-panel-title">
          <div class="field-panel-head">
            <div>
              <h2 id="field-panel-title">現場確認</h2>
              <p id="field-overview-state" class="admin-live-state" aria-live="polite">未取得</p>
            </div>
            <div class="field-actions">
              <button id="bulk-approve-pending-button" type="button">承認待ちを投影</button>
              <button id="bulk-reject-pending-button" type="button">承認待ちを非表示</button>
            </div>
          </div>
          <div id="field-stats" class="field-stats" aria-label="現場確認サマリー"></div>
        </section>
        <section class="admin-layout">
          <section class="admin-column" aria-labelledby="pending-title">
            <h2 id="pending-title">承認待ち</h2>
            <div id="pending-list" class="wish-list"></div>
            <nav id="pending-pager" class="admin-pager" aria-label="承認待ちのページ切り替え"></nav>
          </section>
          <section class="admin-column" aria-labelledby="approved-title">
            <h2 id="approved-title">投影中</h2>
            <div id="approved-list" class="wish-list"></div>
            <nav id="approved-pager" class="admin-pager" aria-label="投影中のページ切り替え"></nav>
          </section>
          <section class="admin-column" aria-labelledby="rejected-title">
            <h2 id="rejected-title">非表示</h2>
            <div id="rejected-list" class="wish-list"></div>
            <nav id="rejected-pager" class="admin-pager" aria-label="非表示のページ切り替え"></nav>
          </section>
        </section>
      </section>

      <section class="admin-tab-panel" data-admin-panel="projection" aria-labelledby="projection-settings-title">
        <section class="admin-controls" aria-labelledby="projection-effects-title">
          <div>
            <h2 id="projection-effects-title">演出</h2>
            <p id="projection-effects-state" class="admin-live-state" aria-live="polite">待機中</p>
          </div>
          <form id="projection-effects-form" class="projection-effects-form">
            <button id="meteor-shower-button" type="submit">流星群</button>
          </form>
        </section>
        <section class="admin-controls projection-settings-panel" aria-labelledby="projection-settings-title">
          <div class="projection-settings-head">
            <h2 id="projection-settings-title">投影設定</h2>
            <p id="projection-settings-state" class="admin-live-state" aria-live="polite">設定未取得</p>
          </div>
          <section class="projection-presets" aria-label="投影設定プリセット">
            <article class="projection-preset" data-projection-preset="0">
              <h3>プリセット1</h3>
              <p class="projection-preset-state">未保存</p>
              <div class="projection-preset-actions">
                <button type="button" data-preset-action="save" data-preset-index="0">保存</button>
                <button type="button" data-preset-action="load" data-preset-index="0">読込</button>
                <button type="button" data-preset-action="clear" data-preset-index="0">クリア</button>
              </div>
            </article>
            <article class="projection-preset" data-projection-preset="1">
              <h3>プリセット2</h3>
              <p class="projection-preset-state">未保存</p>
              <div class="projection-preset-actions">
                <button type="button" data-preset-action="save" data-preset-index="1">保存</button>
                <button type="button" data-preset-action="load" data-preset-index="1">読込</button>
                <button type="button" data-preset-action="clear" data-preset-index="1">クリア</button>
              </div>
            </article>
            <article class="projection-preset" data-projection-preset="2">
              <h3>プリセット3</h3>
              <p class="projection-preset-state">未保存</p>
              <div class="projection-preset-actions">
                <button type="button" data-preset-action="save" data-preset-index="2">保存</button>
                <button type="button" data-preset-action="load" data-preset-index="2">読込</button>
                <button type="button" data-preset-action="clear" data-preset-index="2">クリア</button>
              </div>
            </article>
          </section>
          <form id="projection-settings-form" class="projection-settings-form">
            <fieldset class="settings-group">
              <legend>表示</legend>
              <label class="number-option">
                <span>短冊フォント</span>
                <select id="projection-tanzaku-font-id">
                  <option value="mincho">明朝</option>
                  <option value="gothic">角ゴシック</option>
                  <option value="maru">丸ゴシック</option>
                  <option value="kyokasho">教科書体</option>
                  <option value="brush">筆文字風</option>
                </select>
              </label>
              <label class="detail-toggle" for="projection-color-emoji-font-enabled">
                <input id="projection-color-emoji-font-enabled" type="checkbox" role="switch" aria-label="同梱カラー絵文字フォント">
                <span>カラー絵文字フォント（実験）</span>
              </label>
              <label class="number-option">
                <span>総スロット数</span>
                <input id="projection-slot-count" type="number" min="1" max="60" step="1" inputmode="numeric">
              </label>
              <label class="number-option stepper-option">
                <span>表示数</span>
                <span class="stepper-control">
                  <button type="button" class="stepper-button" data-stepper-target="projection-display-count" data-stepper-delta="-1" aria-label="表示数を減らす">−</button>
                  <input id="projection-display-count" type="number" min="1" max="30" step="1" inputmode="numeric" readonly>
                  <button type="button" class="stepper-button" data-stepper-target="projection-display-count" data-stepper-delta="1" aria-label="表示数を増やす">＋</button>
                </span>
              </label>
              <label class="number-option stepper-option">
                <span>入替数</span>
                <span class="stepper-control">
                  <button type="button" class="stepper-button" data-stepper-target="projection-move-count" data-stepper-delta="-1" aria-label="入替数を減らす">−</button>
                  <input id="projection-move-count" type="number" min="1" max="12" step="1" inputmode="numeric" readonly>
                  <button type="button" class="stepper-button" data-stepper-target="projection-move-count" data-stepper-delta="1" aria-label="入替数を増やす">＋</button>
                </span>
              </label>
            </fieldset>
            <fieldset class="settings-group">
              <legend>タイミング</legend>
              <label class="number-option">
                <span>文字アニメーション速度</span>
                <input id="projection-typing-interval-ms" type="number" min="60" max="1000" step="10" inputmode="numeric">
              </label>
              <label class="number-option">
                <span>ローテーション間隔</span>
                <input id="projection-rotate-interval-ms" type="number" min="5000" max="120000" step="1000" inputmode="numeric">
              </label>
            </fieldset>
            <fieldset class="settings-group">
              <legend>自動演出</legend>
              <label class="detail-toggle" for="projection-effect-auto-enabled">
                <input id="projection-effect-auto-enabled" type="checkbox" role="switch" aria-label="流星群の自動演出">
                <span>自動演出</span>
              </label>
              <label class="number-option">
                <span>イベント間隔</span>
                <input id="projection-effect-interval-ms" type="number" min="60000" max="1800000" step="10000" inputmode="numeric">
              </label>
            </fieldset>
            <fieldset class="settings-group">
              <legend>風</legend>
              <label class="range-option">
                <span class="range-option-label">短冊揺れ強度</span>
                <input id="projection-tanzaku-sway-strength" type="range" min="0" max="3" step="0.05">
                <output id="projection-tanzaku-sway-strength-value" for="projection-tanzaku-sway-strength">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">突風強度</span>
                <input id="projection-wind-gust-strength" type="range" min="0" max="3" step="0.05">
                <output id="projection-wind-gust-strength-value" for="projection-wind-gust-strength">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">突風周期</span>
                <input id="projection-wind-gust-cycle-seconds" type="range" min="3" max="60" step="1">
                <output id="projection-wind-gust-cycle-seconds-value" for="projection-wind-gust-cycle-seconds">30秒</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">ランダム延長</span>
                <input id="projection-wind-gust-cycle-jitter-seconds" type="range" min="0" max="60" step="1">
                <output id="projection-wind-gust-cycle-jitter-seconds-value" for="projection-wind-gust-cycle-jitter-seconds">0秒</output>
              </label>
            </fieldset>
            <fieldset class="settings-group">
              <legend>背景</legend>
              <label class="range-option">
                <span class="range-option-label">天の川の明るさ</span>
                <input id="projection-milky-way-gain" type="range" min="0.5" max="4" step="0.05">
                <output id="projection-milky-way-gain-value" for="projection-milky-way-gain">1.75</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">天の川きらめき</span>
                <input id="projection-milky-way-twinkle" type="range" min="0" max="2.5" step="0.05">
                <output id="projection-milky-way-twinkle-value" for="projection-milky-way-twinkle">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">強い瞬き</span>
                <input id="projection-milky-way-sparkle" type="range" min="0" max="2.5" step="0.05">
                <output id="projection-milky-way-sparkle-value" for="projection-milky-way-sparkle">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">変化速度</span>
                <input id="projection-milky-way-speed" type="range" min="0.2" max="2.5" step="0.05">
                <output id="projection-milky-way-speed-value" for="projection-milky-way-speed">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">粒子数</span>
                <input id="projection-milky-way-particle-count" type="range" min="80" max="720" step="20">
                <output id="projection-milky-way-particle-count-value" for="projection-milky-way-particle-count">340</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">強い瞬き割合</span>
                <input id="projection-milky-way-sparkle-ratio" type="range" min="0" max="0.25" step="0.005">
                <output id="projection-milky-way-sparkle-ratio-value" for="projection-milky-way-sparkle-ratio">0.045</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">瞬き周期分散</span>
                <input id="projection-milky-way-sparkle-period-variance" type="range" min="0" max="2.5" step="0.05">
                <output id="projection-milky-way-sparkle-period-variance-value" for="projection-milky-way-sparkle-period-variance">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">瞬き強度分散</span>
                <input id="projection-milky-way-sparkle-intensity-variance" type="range" min="0" max="2.5" step="0.05">
                <output id="projection-milky-way-sparkle-intensity-variance-value" for="projection-milky-way-sparkle-intensity-variance">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">強い瞬き周期</span>
                <input id="projection-milky-way-sparkle-period-seconds" type="range" min="0.5" max="8" step="0.1">
                <output id="projection-milky-way-sparkle-period-seconds-value" for="projection-milky-way-sparkle-period-seconds">2.2秒</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">強い瞬きデューティ</span>
                <input id="projection-milky-way-sparkle-duty-ratio" type="range" min="0.03" max="0.8" step="0.01">
                <output id="projection-milky-way-sparkle-duty-ratio-value" for="projection-milky-way-sparkle-duty-ratio">16%</output>
              </label>
              <label class="number-option">
                <span>天の川seed</span>
                <input id="projection-milky-way-seed" type="text" maxlength="80" autocomplete="off">
              </label>
              <label class="range-option">
                <span class="range-option-label">ベガ/アルタイル強度</span>
                <input id="projection-tanabata-star-response-intensity" type="range" min="0" max="3" step="0.05">
                <output id="projection-tanabata-star-response-intensity-value" for="projection-tanabata-star-response-intensity">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">ベガ/アルタイル位相差</span>
                <input id="projection-tanabata-star-response-phase-deg" type="range" min="0" max="360" step="5">
                <output id="projection-tanabata-star-response-phase-deg-value" for="projection-tanabata-star-response-phase-deg">166</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">ベガ/アルタイル周期</span>
                <input id="projection-tanabata-star-response-period-seconds" type="range" min="8" max="90" step="1">
                <output id="projection-tanabata-star-response-period-seconds-value" for="projection-tanabata-star-response-period-seconds">35</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">雲の量</span>
                <input id="projection-cloud-count" type="range" min="0" max="12" step="1">
                <output id="projection-cloud-count-value" for="projection-cloud-count">3</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">雲高さ</span>
                <input id="projection-cloud-origin-y" type="range" min="-1" max="1" step="0.05">
                <output id="projection-cloud-origin-y-value" for="projection-cloud-origin-y">0</output>
              </label>
              <label class="number-option">
                <span>雲シード</span>
                <input id="projection-cloud-seed" type="text" maxlength="80" autocomplete="off">
              </label>
            </fieldset>
            <fieldset class="settings-group">
              <legend>実験的演出</legend>
              <label class="detail-toggle" for="projection-experimental-parallax-enabled">
                <input id="projection-experimental-parallax-enabled" type="checkbox" role="switch" aria-label="視差による立体感">
                <span>視差立体感</span>
              </label>
              <label class="detail-toggle" for="projection-parallax-marker-enabled">
                <input id="projection-parallax-marker-enabled" type="checkbox" role="switch" aria-label="消失点マーカーを表示">
                <span>消失点マーカー</span>
              </label>
              <label class="number-option">
                <span>笹舟移動モード</span>
                <select id="projection-parallax-motion-mode">
                  <option value="mapping">壁投影: 左右/前後</option>
                  <option value="camera">実カメラ: 左右/前後</option>
                  <option value="camera-display">実カメラ: 左右/上下</option>
                  <option value="display">ディスプレイ: 左右/上下</option>
                </select>
              </label>
              <label class="range-option">
                <span class="range-option-label">左右</span>
                <input id="projection-parallax-strength" type="range" min="0" max="3" step="0.05">
                <output id="projection-parallax-strength-value" for="projection-parallax-strength">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">前後/上下</span>
                <input id="projection-parallax-popout-strength" type="range" min="0" max="3" step="0.05">
                <output id="projection-parallax-popout-strength-value" for="projection-parallax-popout-strength">0</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">短冊奥行</span>
                <input id="projection-parallax-depth-multiplier" type="range" min="0" max="3" step="0.05">
                <output id="projection-parallax-depth-multiplier-value" for="projection-parallax-depth-multiplier">1</output>
              </label>
              <label class="range-option">
                <span class="range-option-label">奥行基準順</span>
                <input id="projection-parallax-depth-reference-index" type="range" min="0" max="60" step="1">
                <output id="projection-parallax-depth-reference-index-value" for="projection-parallax-depth-reference-index">中央</output>
              </label>
              <div class="range-pair range-pair--viewer" aria-label="鑑賞地点">
                <p class="range-pair-label">鑑賞地点</p>
                <label class="range-option">
                  <span class="range-option-label">X</span>
                  <input id="projection-parallax-viewer-offset-x" type="range" min="-2" max="2" step="0.05">
                  <output id="projection-parallax-viewer-offset-x-value" for="projection-parallax-viewer-offset-x">0</output>
                </label>
                <label class="range-option">
                  <span class="range-option-label">Y</span>
                  <input id="projection-parallax-viewer-offset-y" type="range" min="-2" max="2" step="0.05">
                  <output id="projection-parallax-viewer-offset-y-value" for="projection-parallax-viewer-offset-y">0</output>
                </label>
                <label class="range-option">
                  <span class="range-option-label">距離</span>
                  <input id="projection-parallax-viewer-distance" type="range" min="0.5" max="8" step="0.1">
                  <output id="projection-parallax-viewer-distance-value" for="projection-parallax-viewer-distance">2.5</output>
                </label>
              </div>
              <label class="range-option">
                <span class="range-option-label">余白</span>
                <input id="projection-viewport-margin" type="range" min="0" max="24" step="0.5">
                <output id="projection-viewport-margin-value" for="projection-viewport-margin">0</output>
              </label>
              <div class="range-pair" aria-label="消失点">
                <p class="range-pair-label">消失点</p>
                <label class="range-option">
                  <span class="range-option-label">X</span>
                  <input id="projection-parallax-vanishing-point-x" type="range" min="-1" max="1" step="0.01">
                  <output id="projection-parallax-vanishing-point-x-value" for="projection-parallax-vanishing-point-x">0</output>
                </label>
                <label class="range-option">
                  <span class="range-option-label">Y</span>
                  <input id="projection-parallax-vanishing-point-y" type="range" min="-1" max="1" step="0.01">
                  <output id="projection-parallax-vanishing-point-y-value" for="projection-parallax-vanishing-point-y">0</output>
                </label>
              </div>
            </fieldset>
            <div class="settings-actions">
              <button type="submit">適用</button>
            </div>
          </form>
        </section>
      </section>

      <section class="admin-tab-panel" data-admin-panel="backup" aria-labelledby="backup-title">
        <section class="admin-controls" aria-labelledby="backup-title">
          <div>
            <h2 id="backup-title">バックアップ</h2>
            <p id="backup-state" class="admin-live-state" aria-live="polite">未取得</p>
          </div>
          <div class="admin-controls-actions">
            <button id="backup-create-button" type="button">バックアップ作成</button>
            <button id="backup-refresh-button" type="button">一覧更新</button>
          </div>
        </section>
        <section class="backup-panel" aria-label="願い事バックアップ一覧">
          <div id="backup-list" class="backup-list"></div>
        </section>
      </section>
    </main>
  </body>
</html>
